services:
  - type: web
    name: starbucks-rag-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/build_index.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHONUNBUFFERED
        value: "1"
